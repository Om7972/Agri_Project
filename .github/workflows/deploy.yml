name: MandiPrime CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    env:
      # Prisma needs a valid DATABASE_URL to generate client
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Mock secrets so the app module can be imported during tests
      JWT_ACCESS_SECRET: "test_jwt_access_secret_minimum_32_chars_ok"
      JWT_REFRESH_SECRET: "test_jwt_refresh_secret_minimum_32_chars_ok"
      NODE_ENV: test
      PORT: 5000
      CORS_ORIGIN: "*"
      REDIS_URL: "redis://localhost:6379"

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate

      - name: Run Jest Tests
        run: |
          cd backend
          npm test -- --passWithNoTests --forceExit

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js App
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api-mock.mandiprime.com/api/v1
