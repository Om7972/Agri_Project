services:
  # 1. Express backend service
  - type: web
    name: mandiprime-backend
    env: node
    plan: starter
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mandiprime-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mandiprime-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: '*'

  # 2. Next.js Frontend service
  - type: web
    name: mandiprime-frontend
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: mandiprime-backend
          type: web
          property: url
          path: /api/v1

databases:
  - name: mandiprime-db
    plan: starter
    databaseName: mandiprime
    user: postgres

interfaces:
  - type: redis
    name: mandiprime-redis
    plan: starter
    ipAllowList: [] # empty means only services in the same account can connect
